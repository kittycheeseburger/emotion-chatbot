services:
  - type: web
    name: emotion-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.deploy.txt && cd frontend && npm ci && npm run build
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: APP_ENV
        value: production
      - key: CHAT_REPLY_MODE
        value: rag
